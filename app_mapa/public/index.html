<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Cidades</title>
    <link rel="stylesheet" href="style.css">
    <!-- Usando Leaflet para o mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistema de Visualização de Cidades</h1>
            <div class="upload-section">
                <input type="file" id="excelFile" accept=".xlsx, .xls" />
                <button id="uploadBtn">Carregar Arquivo XLSX</button>
            </div>
        </header>

        <div class="filters">
            <div class="filter-group">
                <label for="ufFilter">Filtrar por UF:</label>
                <select id="ufFilter">
                    <option value="">Todas as UFs</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="tipoFilter">Filtrar por Tipo:</label>
                <select id="tipoFilter">
                    <option value="">Todos os Tipos</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="mapType">Estilo do Mapa:</label>
                <select id="mapType">
                    <option value="osm">OpenStreetMap</option>
                    <option value="satellite">Satélite (Esri)</option>
                    <option value="dark">Dark Matter</option>
                    <option value="light">Light Matter</option>
                    <option value="terrain">Terreno</option>
                    <option value="streets">Ruas (Esri)</option>
                    <option value="topo">Topográfico</option>
                    <option value="voyager">Voyager (CartoDB)</option>
                    <option value="positron">Positron (CartoDB)</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="viewType">Tipo de Visualização:</label>
                <select id="viewType">
                    <option value="markers">Marcadores</option>
                    <option value="heatmap">Mancha de Calor (Roxo/Azul)</option>
                    <option value="heatmap-verde">Mancha de Calor (Verde)</option>
                    <option value="heatmap-laranja">Mancha de Calor (Laranja/Vermelho)</option>
                    <option value="heatmap-azul">Mancha de Calor (Azul)</option>
                    <option value="heatmap-arcoiris">Mancha de Calor (Arco-Íris)</option>
                    <option value="clusters">Agrupamento (Clusters)</option>
                    <option value="circulos">Círculos Proporcionais</option>
                    <option value="quadrantes">Quadrantes de Densidade</option>
                    <option value="densidade-vermelho">Densidade (Vermelho)</option>
                    <option value="densidade-lilas">Densidade (Lilás)</option>
                </select>
            </div>
            <div class="filter-group">
                <label>&nbsp;</label>
                <button id="toggleMarkers" style="padding: 8px 16px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">
                    📍 Ocultar Marcadores
                </button>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="map-container">
                <div id="map"></div>
                <button id="fullscreenBtn" class="fullscreen-btn" title="Tela Cheia">
                    ⛶
                </button>
            </div>
            <div class="summary-table-container">
                <h3>Tabela Resumo</h3>
                <table id="summaryTable">
                    <thead>
                        <tr>
                            <th>UF</th>
                            <th>Total Cidades</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dados serão inseridos aqui dinamicamente -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Carregar o script do Leaflet e do Heatmap -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.min.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="script.js"></script>
</body>
</html>
