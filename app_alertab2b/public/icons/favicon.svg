<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo -->
  <rect width="100" height="100" rx="20" fill="#2563eb"/>
  
  <!-- Ícone de gráfico -->
  <g transform="translate(50, 50)">
    <!-- Barra 1 -->
    <rect x="-25" y="10" width="12" height="20" rx="2" fill="white" opacity="0.8"/>
    <!-- Barra 2 -->
    <rect x="-8" y="-5" width="12" height="35" rx="2" fill="white" opacity="0.9"/>
    <!-- Barra 3 -->
    <rect x="9" y="-15" width="12" height="45" rx="2" fill="white"/>
  </g>
  
  <!-- Borda -->
  <rect width="100" height="100" rx="20" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
</svg>
